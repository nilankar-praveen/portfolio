<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Container with Background Repeat</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0; /* Optional background color */
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    background-image: url('your-background-image.jpg');
    background-repeat: repeat;\
    background-size: cover; /* Adjust the background size as per your need */
    background-position: center; /* Adjust the background position as per your need */
    border-radius: 10px; /* Optional border radius */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Optional box shadow */
  }

  /* Optional styling for content inside the container */
  .content {
    color: #333;
    line-height: 1.6;
  }

  .logo {
    text-align: center;
    margin-bottom: 20px;
  }

  .row {
    background: linear-gradient(90deg, #FFC85E 0%, #FED381 32.5%, #FFE0A5 66.4%, #FFE8BA 100%);
    padding: 20px;
    border-radius: 5px;
    margin-bottom: 20px;
    position: relative;
  }

  .row::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 2px dashed #fff;
    border-radius: 5px;
    pointer-events: none;
  }

  .row-content {
    display: flex;
    align-items: center;
  }

  .icon {
    font-size: 24px;
    margin-right: 10px;
  }

  .description {
    padding-left: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <img src="your-logo.png" alt="Logo">
  </div>

  <div class="row">
    <div class="row-content">
      <div class="icon">Icon</div>
      <div class="description">
        <h3>Icon Title</h3>
        <p>Description goes here.</p>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="row-content">
      <div class="icon">Icon</div>
      <div class="description">
        <h3>Icon Title</h3>
        <p>Description goes here.</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
